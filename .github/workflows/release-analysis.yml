name: release-analysis

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install (dev)
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Tests
        run: pytest -q

      - name: Build analysis artifacts
        run: |
          python tools/build_analysis.py
          python tools/write_analysis_sha256.py
          ls -la analysis/results

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: |
            analysis/results/window_metrics.csv
            analysis/results/keyness_last_vs_first.csv
            analysis/results/chapter_lengths.csv
            analysis/results/volume_plan_candidates.json
            analysis/results/analysis.sha256
